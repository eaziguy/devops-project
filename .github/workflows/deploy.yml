name: Deploy to AWS

on:
  push:
    branches:
    - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      = name: Connect and deploy
        uses: appleboy/ssh-action@master
        with: 
          host: ${{ secrets.HOST }}
          username: ${{ secret.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd devops-project
            ./deploy.sh
